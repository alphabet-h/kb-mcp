[workspace]
members = ["cargo:."]

# Config for 'dist'
[dist]
# The preferred dist version to use in CI (Cargo.toml SemVer syntax)
cargo-dist-version = "0.31.0"
# CI backends to support
ci = "github"
# The installers to generate for each app
installers = []
# Target platforms to build apps for (Rust target-triple syntax).
# Note: x86_64-apple-darwin (Intel Mac) is intentionally excluded — `ort-sys`
# does not provide prebuilt ONNX Runtime binaries for that target, and
# building from source on every release is not worth the cost given the
# shrinking Intel Mac user base. Apple Silicon (aarch64) is fully supported.
targets = ["aarch64-apple-darwin", "aarch64-unknown-linux-gnu", "x86_64-unknown-linux-gnu", "x86_64-pc-windows-msvc"]
# Where to host releases
hosting = "github"
# Disable static-CRT linking on Windows. The default (true) forces /defaultlib:libcmt
# which conflicts with `ort-sys` (ONNX Runtime) — its prebuilt binary is linked against
# the dynamic UCRT, causing LNK2001 unresolved external symbols (__imp_tolower etc.).
# Dynamic CRT means kb-mcp.exe depends on ucrtbase.dll / vcruntime140.dll, both shipped
# with Windows 10+ (and the VC++ Redistributable on older Windows).
msvc-crt-static = false

# Bump Linux runners from cargo-dist's default ubuntu-22.04 (glibc 2.35) to
# ubuntu-24.04 (glibc 2.39). The prebuilt ort-sys binary references __isoc23_*
# symbols introduced in glibc 2.38, so 22.04 fails to link with "undefined symbol:
# __isoc23_strtoull" etc. ubuntu-24.04-arm is the matching aarch64 GitHub runner.
# Practical impact: kb-mcp Linux binaries require glibc 2.38+ on the user system
# (Ubuntu 24.04+, Debian 13+, RHEL 9.5+, Fedora 39+).
[dist.github-custom-runners]
x86_64-unknown-linux-gnu = "ubuntu-24.04"
aarch64-unknown-linux-gnu = "ubuntu-24.04-arm"
