# Personal-machine HTTP deployment — kb-mcp.toml
#
# This file pairs with examples/deployments/personal-http/.mcp.json and one of
# the three OS launcher templates in this same directory (Linux systemd user,
# macOS launchd, Windows Task Scheduler). See README.md / README.ja.md for the
# full setup walkthrough.
#
# What this deployment is for
# ---------------------------
# Single physical machine. One kb-mcp daemon running as a long-lived loopback
# HTTP service on `127.0.0.1:3100`. Every Claude Code / Cursor session on the
# machine — across multiple projects opened in parallel — connects to that one
# daemon via Streamable HTTP instead of spawning a per-session stdio kb-mcp
# child. Result: one embedder + one DB + one watcher, regardless of how many
# editor windows you open.
#
# If you only ever have one Claude Code session open at a time, prefer the
# simpler `personal/` recipe (stdio) which avoids needing an OS service unit.

# Absolute path to your knowledge base directory.
# .kb-mcp.db lands at <kb_path>/../.kb-mcp.db automatically.
kb_path = "/absolute/path/to/your/knowledge-base"

# Embedding model. Switch to "bge-m3" for Japanese / multilingual KBs
# (slower / larger first download, but markedly better recall on non-English text).
model = "bge-small-en-v1.5"

# Cross-encoder reranker. Loaded but off by default — clients opt in per-query
# via the MCP search parameter `rerank: true`. Comment out if you don't want
# to pay the ~2.3 GB first-download cost.
# reranker = "bge-v2-m3"
# rerank_by_default = false

# Share the ONNX model cache across kb-mcp invocations on this machine.
# Defaults to your OS cache dir (e.g. ~/.cache/fastembed on Linux); set
# explicitly here if you want to share with other tools that already cache
# HF models in HF hub layout.
# fastembed_cache_dir = "/home/you/.cache/huggingface/hub"

[parsers]
enabled = ["md"]

# File watcher — same defaults as the stdio personal recipe. The HTTP daemon
# is the single writer, so inotify on local disk is reliable and there is no
# multi-writer coordination to worry about.
[watch]
enabled = true
debounce_ms = 500

[quality_filter]
enabled = true
threshold = 0.3

# HTTP transport, loopback-only.
#
# - Bind is `127.0.0.1:3100` (and only `127.0.0.1` — IPv6 ::1 is reachable by
#   the same hostname/port on most clients without explicit listing).
# - allowed_hosts is intentionally NOT set: the rmcp default
#   ["localhost", "127.0.0.1", "::1"] is exactly what we want here.
# - DO NOT change the bind to 0.0.0.0 or a LAN IP. kb-mcp has no built-in
#   authentication; if you need LAN exposure, switch to the `intranet-http/`
#   recipe and put nginx + auth in front.
[transport]
kind = "http"

[transport.http]
bind = "127.0.0.1:3100"
